services:
  - type: web
    name: eco-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerCommand: /app/start.sh
    healthCheckPath: /health
    envVars:
      - fromGroup: eco-backend-env
      - key: DATABASE_URL
        fromDatabase:
          name: eco-postgres
          property: connectionString

  - type: worker
    name: eco-celery
    runtime: docker
    rootDir: backend
    plan: free
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    envVars:
      - fromGroup: eco-backend-env
      - key: DATABASE_URL
        fromDatabase:
          name: eco-postgres
          property: connectionString

databases:
  - name: eco-postgres
    plan: free

envVarGroups:
  - name: eco-backend-env
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_BASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: WHATSAPP_BASE_URL
        value: https://graph.facebook.com
