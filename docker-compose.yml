services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: eco_db
      POSTGRES_USER: eco
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eco_secret}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eco -d eco_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eco:eco_secret@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["./backend:/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://eco:eco_secret@postgres:5432/eco_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    volumes: ["./backend:/app"]

  mock-whatsapp:
    image: node:20-alpine
    working_dir: /mock
    command: sh -c "npm install && node mock-server.js"
    ports: ["4010:4010"]
    volumes:
      - ./backend/tests/mock_servers:/mock

volumes:
  pgdata:
